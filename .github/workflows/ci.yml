name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build DevContext.slnx --configuration Release

      - name: Test (fast suite)
        run: dotnet test DevContext.slnx --configuration Release --filter "Category!=CliSmoke&Category!=Eval&Category!=Network"

      - name: Verify strict mode
        run: dotnet run --project src/DevContext.Cli --configuration Release -- analyze tests/fixtures/MinimalApiProject --strict
