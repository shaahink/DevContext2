<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>DevContext</title>
    <link rel="stylesheet" href="app.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="app"><div class="empty-state" style="margin-top:40vh"><p>Loading...</p></div></div>
    <script>
// ── State ────────────────────────────────────────────────────
let state = null, selectedTab = 'human';

window.setDevContextState = function(s) {
    state = s;
    render();
    setTimeout(lucide.createIcons, 50);
};

function post(action, value, key, boolValue) {
    window.chrome.webview.postMessage({ action, value, key, boolValue });
}

// ── Render ───────────────────────────────────────────────────
function render() {
    if (!state) return;
    var s = state;
    document.getElementById('app').innerHTML =
        `<div class="app ${s.hasOutput ? 'has-output' : ''} ${s.isAnalyzing ? 'is-loading' : ''}">
            <main class="main">
                ${sidebar(s)}
                <div class="splitter"></div>
                ${output(s)}
            </main>
            ${statusbar(s)}
        </div>`;
}

// ── Sidebar ──────────────────────────────────────────────────
function sidebar(s) {
    return `<aside class="config-panel">
        <header class="config-header"><h1 class="app-title"><i data-lucide="braces" style="width:20px;height:20px"></i> DevContext <span class="version">v2.0.0</span></h1></header>
        <nav class="config-sections">
            <section class="config-group">
                <h2 class="group-label">Source</h2>
                <div class="source-row">
                    <input class="input" value="${esc(s.projectPath)}" oninput="post('setProjectPath',this.value)" placeholder="Path, .sln, .csproj, or github.com/user/repo" />
                    <button class="btn-icon" title="Browse folder" onclick="post('pickFolder')"><i data-lucide="folder-open" style="width:18px;height:18px"></i></button>
                    <button class="btn-icon" title="Browse solution" onclick="post('pickFile')"><i data-lucide="file-search" style="width:18px;height:18px"></i></button>
                </div>
                ${s.isGitHubUrl ? `<div class="github-pill"><span class="pill-text">${esc(s.gitRepoDisplay)}</span><select class="cleanup-select" value="${s.cloneCleanup}" onchange="post('execute',this.value,null,false,'setCleanup')"><option value="24h">Cache 24h</option><option value="auto">Auto-clean</option><option value="session">Keep for session</option><option value="keep">Keep permanently</option></select></div>` : ''}
                ${s.recentPaths.length ? `<div class="recent-list">${s.recentPaths.map(p => `<button class="chip" title="${esc(p)}" onclick="post('selectRecent','${esc(p)}')">${shortName(p)}</button>`).join('')}</div>` : ''}
            </section>
            <section class="config-group">
                <h2 class="group-label">Shape the context</h2>
                <label class="field-label">Scenario</label>
                <select class="input select" onchange="post('setScenario',this.value)">${s.scenarios.map(sc => `<option value="${sc.value}" ${sc.value===s.scenarioValue?'selected':''}>${sc.label}</option>`).join('')}</select>
                <label class="field-label">Profile</label>
                <div class="segmented">${s.profiles.map(p => `<button class="seg-option ${s.selectedProfile===p.value?'active':''}" onclick="post('setProfile','${p.value}')">${p.label}</button>`).join('')}</div>
                <label class="field-label">Token budget</label>
                <div class="token-slider"><input type="range" min="500" max="50000" step="500" value="${s.maxTokens}" oninput="post('setMaxTokens',this.value)" /><input type="number" class="input token-input" min="500" max="50000" value="${s.maxTokens}" onchange="post('setMaxTokens',this.value)" /></div>
                <label class="field-label">Symbol focus <span class="hint">(optional)</span></label>
                <input class="input" value="${esc(s.around)}" oninput="post('setAround',this.value)" placeholder="Namespace.Class:Method" />
            </section>
            <section class="config-group">
                <h2 class="group-label">Output</h2>
                <label class="field-label">Format</label>
                <div class="segmented"><button class="seg-option ${s.selectedFormat==='markdown'?'active':''}" onclick="post('setFormat','markdown')">Markdown</button><button class="seg-option ${s.selectedFormat==='json'?'active':''}" onclick="post('setFormat','json')">JSON</button></div>
                <details class="advanced"><summary class="advanced-summary">Advanced</summary><div class="advanced-body">
                    ${check('Include provenance','includeProvenance',s.includeProvenance)}
                    ${check('Include diagnostics','includeDiagnostics',s.includeDiagnostics)}
                    ${check('Skip Roslyn (faster, no call graph)','noRoslyn',s.noRoslyn)}
                    ${check('Dry run (plan only)','dryRun',s.dryRun)}
                    ${check('Include anti-pattern detection','includeAntiPatterns',s.includeAntiPatterns)}
                </div></details>
            </section>
        </nav>
        <footer class="config-footer">
            <button class="btn-primary" ${!s.projectPath?'disabled':''} onclick="post('analyze')">${esc(s.analyzeButtonText)}</button>
        </footer>
    </aside>`;
}

function check(label, key, val) {
    return `<label class="toggle-label"><input type="checkbox" ${val?'checked':''} onchange="post('toggleBool','',key,this.checked)" /> ${label}</label>`;
}

// ── Output ───────────────────────────────────────────────────
function output(s) {
    if (!s.hasOutput && !s.isAnalyzing) return `<section class="output-panel"><div class="empty-state"><i data-lucide="file-text" style="width:48px;height:48px;opacity:0.3"></i><p class="empty-title">Choose a project, then Analyse</p><p class="empty-sub">Structured, token-budgeted context ready to paste into any LLM</p></div></section>`;

    return `<section class="output-panel">
        <div class="output-toolbar">
            <div class="tabs">
                <button class="tab ${selectedTab==='human'?'active':''}" onclick="selectTab('human')">Human</button>
                <button class="tab ${selectedTab==='llm'?'active':''}" onclick="selectTab('llm')">LLM</button>
                ${s.sectionGroups.length > 1 ? `<button class="btn-sections" id="btn-sections" onclick="toggleSections()"><i data-lucide="panel-right" style="width:14px;height:14px"></i> Sections</button>` : ''}
            </div>
            <div class="toolbar-actions">
                <button class="btn-icon" title="Copy to clipboard" onclick="copyText(selectedTab==='llm'?'${escJs(s.llmViewText)}':'${escJs(s.humanViewText)}')"><i data-lucide="copy" style="width:18px;height:18px"></i></button>
                <button class="btn-icon" title="Save to file" onclick="post('saveFile')"><i data-lucide="download" style="width:18px;height:18px"></i></button>
                <button class="btn-icon" title="Copy for LLM" onclick="copyText('${escJs(s.llmViewText)}')"><i data-lucide="copy-check" style="width:18px;height:18px"></i></button>
            </div>
        </div>
        <div id="sections-drawer"></div>
        <pre class="output-text"><code>${esc(selectedTab==='human'? s.humanViewText : s.llmViewText)}</code></pre>
        ${s.isAnalyzing ? `<div class="loading-overlay"><div class="spinner"></div><p>${esc(s.progressText)}</p></div>` : ''}
    </section>`;
}

function statusbar(s) {
    return `<footer class="status-bar"><span class="status-phase">${s.isProgressVisible ? esc(s.progressText) : ''}</span><span class="status-stats">${s.hasOutput ? esc(s.statsText) : ''}</span></footer>`;
}

// ── Helpers ──────────────────────────────────────────────────
function esc(str) { if (!str) return ''; var d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
function escJs(str) { if (!str) return ''; return str.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n').replace(/\r/g,''); }
function shortName(p) { return p.includes('/') ? p.split('/').pop() : p.split('\\').filter(Boolean).pop() || p; }
function selectTab(t) { selectedTab = t; render(); setTimeout(lucide.createIcons, 50); }
function toggleSections() { var d = document.getElementById('sections-drawer'); d.innerHTML = d.innerHTML ? '' : buildSections(); }
async function copyText(text) { try { await navigator.clipboard.writeText(text); } catch(e) { prompt('Copy:', text); } }

function buildSections() {
    if (!state || !state.sectionGroups.length) return '';

    var groups = state.sectionGroups;
    var total = groups.reduce((s,g) => s + g.children.filter(c=>c.isIncluded).reduce((a,b)=>a+b.compressedTokens,0), 0);
    var budget = state.budgetTokens || 8000;
    var pct = budget ? Math.min(100, total/budget*100) : 0;
    var cls = total > budget ? 'danger' : total >= budget * 0.85 ? 'warning' : 'normal';

    var html = `<div class="sections-drawer">
        <div class="section-budget">
            <div class="budget-bar-wrapper">
                <div class="budget-bar"><div class="budget-fill ${cls}" style="width:${pct}%"></div></div>
                <span class="budget-text ${total>budget?'danger':''}">${total.toLocaleString()} / ${budget.toLocaleString()} tokens</span>
            </div>
            <button class="btn-text" onclick="post('resetDefaults')">Reset to defaults</button>
        </div>`;

    groups.forEach(g => {
        html += `<details open><summary><label><input type="checkbox" ${g.children.every(c=>c.isIncluded)?'checked':''} onchange="toggleGroup('${g.name}',this.checked)" /> ${esc(g.name)}</label><span class="group-tokens">${g.totalTokens.toLocaleString()} tok</span></summary>`;
        g.children.forEach(c => {
            html += `<label class="section-row" style="padding-left:20px"><input type="checkbox" ${c.isIncluded?'checked':''} onchange="post('toggleSection','${esc(c.name)}',null,this.checked)" /> ${esc(c.name)} <span class="section-tokens">${c.compressedTokens.toLocaleString()} tok</span></label>`;
        });
        html += `</details>`;
    });

    html += `</div>`;
    return html;
}

function toggleGroup(name, val) {
    var g = state.sectionGroups.find(g => g.name === name);
    if (g) g.children.forEach(c => { c.isIncluded = val; post('toggleSection', c.name, null, val); });
    render();
}
</script>
</body>
</html>
